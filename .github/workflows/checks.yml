name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -B -m unittest discover -v

      - name: CLI smoke checks
        shell: bash
        run: |
          python vanilla_bot.py --help
          python backtest_moex.py --help
          python vanilla_bot.py SBER TQBR --qty 1 --price 300 | tee sber.out
          grep -q '"OrderStrategyId": "dakhmedov_SBER_' sber.out
          python vanilla_bot.py CNYRUB_TOM CETS --volume 2000000 --slippage 0.1 --last-price 10.46 | tee cny.out
          grep -q '"OrderStrategyId": "dakhmedov_CNYRUB_TOM_' cny.out
          expect_error() {
            set +e
            "$@"
            code=$?
            set -e
            test "$code" -eq 2
          }
          expect_error python vanilla_bot.py SBER TQBR --price 300
          expect_error python vanilla_bot.py SBER TQBR --qty 1

      - name: RabbitMQ smoke test
        env:
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: python scripts/rabbitmq_smoke.py

      - name: Compile Python files
        run: python -B -m py_compile trading_core.py vanilla_bot.py backtest_moex.py scripts/rabbitmq_smoke.py tests/test_vanilla_bot.py tests/test_backtest_moex.py

      - name: Check installed packages
        run: python -m pip check
